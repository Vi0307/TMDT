<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Xác Thực OTP – Hội An Tinh Hoa</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,600;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Be Vietnam Pro', sans-serif; min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background-color: #fbf9f4;
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L35 15L45 15L37 22L40 32L30 26L20 32L23 22L15 15L25 15Z' fill='%23e5a022' fill-opacity='0.05'/%3E%3C/svg%3E");
  padding: 24px;
}
.material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; line-height:1; user-select:none; }

.blob1 { position:fixed; top:-80px; left:-80px; width:320px; height:320px; background:rgba(229,160,34,0.08); border-radius:50%; filter:blur(60px); pointer-events:none; }
.blob2 { position:fixed; bottom:-80px; right:-80px; width:400px; height:400px; background:rgba(181,36,36,0.05); border-radius:50%; filter:blur(80px); pointer-events:none; }

.card { width:100%; max-width:400px; background:#fff; border-radius:2px; box-shadow:0 20px 60px rgba(74,44,42,0.12),0 4px 16px rgba(74,44,42,0.07); overflow:hidden; }
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.card { animation:fadeUp 0.45s ease both; }

/* HEADER */
.card-header { background:linear-gradient(135deg,#281800 0%,#805600 100%); padding:30px 32px 24px; text-align:center; position:relative; overflow:hidden; }
.card-header::before { content:''; position:absolute; inset:0; background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 3L23 10L30 10L24.5 14.5L26.5 21.5L20 17L13.5 21.5L15.5 14.5L10 10L17 10Z' fill='%23ffffff' fill-opacity='0.04'/%3E%3C/svg%3E"); }
.hdr-icon { width:52px; height:52px; background:rgba(229,160,34,0.15); border-radius:50%; display:inline-flex; align-items:center; justify-content:center; margin-bottom:12px; border:1px solid rgba(229,160,34,0.3); position:relative; }
.card-header h1 { font-family:'Noto Serif',serif; font-size:20px; font-weight:700; color:#fff; position:relative; margin-bottom:4px; }
.card-header p { font-size:10px; letter-spacing:0.15em; color:rgba(229,160,34,0.85); text-transform:uppercase; position:relative; }

/* STEPS */
.steps { display:flex; align-items:center; justify-content:center; gap:0; padding:16px 32px; background:#faf8f3; border-bottom:1px solid #ede6db; }
.step { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; }
.step-dot { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; border:2px solid #d6c4ae; color:#a89580; background:#fff; transition:all 0.3s; }
.step-dot.active { border-color:#805600; color:#805600; background:rgba(128,86,0,0.06); }
.step-dot.done { border-color:#805600; color:#fff; background:#805600; }
.step-label { font-size:9px; letter-spacing:0.08em; color:#a89580; text-transform:uppercase; white-space:nowrap; }
.step-label.active { color:#805600; font-weight:600; }
.step-line { flex:0 0 28px; height:1px; background:#d6c4ae; margin-top:-10px; }
.step-line.done { background:#805600; }

/* FORM BODY */
.form-body { padding:28px 32px 24px; text-align:center; }
.desc { font-size:13px; color:#514534; line-height:1.6; margin-bottom:6px; }
.email-badge { display:inline-block; background:#faf8f3; border:1px solid #d6c4ae; border-radius:2px; padding:6px 14px; font-size:13px; font-weight:600; color:#805600; margin-bottom:24px; }

/* OTP INPUTS */
.otp-row { display:flex; justify-content:center; gap:10px; margin-bottom:8px; }
.otp-input {
  width:48px; height:56px;
  text-align:center; font-size:22px; font-weight:600;
  font-family:'Noto Serif',serif; color:#1b1c19;
  border:2px solid #d6c4ae; border-radius:2px; background:#faf8f3;
  outline:none; transition:all 0.2s;
  caret-color:#805600;
}
.otp-input:focus { border-color:#805600; background:#fff; box-shadow:0 0 0 3px rgba(128,86,0,0.08); }
.otp-input.filled { border-color:#805600; background:#fff; }

/* TIMER */
.timer-row { display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:22px; font-size:12px; color:#837562; }
.timer-num { font-weight:700; color:#805600; min-width:28px; text-align:center; }
.resend-btn { background:none; border:none; cursor:pointer; font-family:'Be Vietnam Pro',sans-serif; font-size:12px; color:#b52424; font-weight:600; text-decoration:underline; display:none; }
.resend-btn.visible { display:inline; }

/* BUTTON */
.btn-main { width:100%; padding:14px; background:linear-gradient(135deg,#b52424,#8a1a1a); color:#fff; font-family:'Be Vietnam Pro',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; border:none; border-radius:2px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 4px 16px rgba(181,36,36,0.35); transition:all 0.3s; position:relative; overflow:hidden; }
.btn-main::before { content:''; position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent); transition:left 0.5s; }
.btn-main:hover::before { left:100%; }
.btn-main:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(181,36,36,0.45); }

.back-row { text-align:center; margin-top:18px; }
.back-link { display:inline-flex; align-items:center; gap:5px; color:#837562; font-size:12px; text-decoration:none; transition:color 0.2s; }
.back-link:hover { color:#805600; }

.card-foot { background:#faf8f3; border-top:1px solid #ede6db; padding:14px 32px; text-align:center; }
.card-foot p { font-family:'Noto Serif',serif; font-style:italic; font-size:12px; color:#837562; }
</style>
</head>
<body>
<div class="blob1"></div>
<div class="blob2"></div>

<div class="card">
  <div class="card-header">
    <div class="hdr-icon">
      <span class="material-symbols-outlined" style="color:#ffba47;font-size:26px;position:relative;">verified_user</span>
    </div>
    <h1>Xác Thực OTP</h1>
    <p>Nhập mã 6 chữ số</p>
  </div>

  <div class="steps">
    <div class="step">
      <div class="step-dot done">
        <span class="material-symbols-outlined" style="font-size:14px;color:#fff;">check</span>
      </div>
      <span class="step-label">Email</span>
    </div>
    <div class="step-line done"></div>
    <div class="step">
      <div class="step-dot active">2</div>
      <span class="step-label active">Mã OTP</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-dot">3</div>
      <span class="step-label">Mật khẩu mới</span>
    </div>
  </div>

  <div class="form-body">
    <p class="desc">Mã xác thực đã được gửi đến</p>
    <div class="email-badge" id="email-display">example@hoian.com</div>

    <form onsubmit="goToReset(event)">
      <div class="otp-row">
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" id="o1"/>
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" id="o2"/>
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" id="o3"/>
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" id="o4"/>
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" id="o5"/>
        <input class="otp-input" type="text" inputmode="numeric" maxlength="1" id="o6"/>
      </div>

      <!-- Timer -->
      <div class="timer-row">
        <span class="material-symbols-outlined" style="font-size:16px;color:#837562;">schedule</span>
        Mã hết hạn sau <span class="timer-num" id="timer">02:00</span>
        <button class="resend-btn" id="resend-btn" type="button" onclick="resendOtp()">Gửi lại</button>
      </div>

      <button class="btn-main" type="submit">
        Xác Nhận Mã
        <span class="material-symbols-outlined" style="font-size:18px;">arrow_forward</span>
      </button>
    </form>

    <div class="back-row">
      <a class="back-link" href="nhapemail.html">
        <span class="material-symbols-outlined" style="font-size:16px;">arrow_back</span>
        Quay lại nhập email
      </a>
    </div>
  </div>

  <div class="card-foot">
    <p>"Kiên nhẫn là chìa khóa của mọi thành công."</p>
  </div>
</div>

<script>
// Show email
const email = sessionStorage.getItem('reset_email') || 'example@hoian.com';
document.getElementById('email-display').textContent = email;

// OTP auto-focus
const inputs = document.querySelectorAll('.otp-input');
inputs.forEach((inp, i) => {
  inp.addEventListener('input', () => {
    inp.value = inp.value.replace(/\D/g, '');
    if (inp.value) {
      inp.classList.add('filled');
      if (i < inputs.length - 1) inputs[i+1].focus();
    } else {
      inp.classList.remove('filled');
    }
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !inp.value && i > 0) inputs[i-1].focus();
  });
  inp.addEventListener('paste', e => {
    const data = e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
    data.split('').forEach((c, j) => {
      if (inputs[j]) { inputs[j].value = c; inputs[j].classList.add('filled'); }
    });
    e.preventDefault();
  });
});

// Timer
let secs = 120;
const timerEl = document.getElementById('timer');
const resendBtn = document.getElementById('resend-btn');
const tick = setInterval(() => {
  secs--;
  const m = String(Math.floor(secs/60)).padStart(2,'0');
  const s = String(secs%60).padStart(2,'0');
  timerEl.textContent = m + ':' + s;
  if (secs <= 0) {
    clearInterval(tick);
    timerEl.textContent = '00:00';
    timerEl.style.color = '#b52424';
    resendBtn.classList.add('visible');
  }
}, 1000);

function resendOtp() {
  secs = 120; timerEl.style.color = '#805600';
  resendBtn.classList.remove('visible');
  const tick2 = setInterval(() => {
    secs--;
    const m = String(Math.floor(secs/60)).padStart(2,'0');
    const s = String(secs%60).padStart(2,'0');
    timerEl.textContent = m + ':' + s;
    if (secs <= 0) { clearInterval(tick2); timerEl.textContent='00:00'; timerEl.style.color='#b52424'; resendBtn.classList.add('visible'); }
  }, 1000);
}

function goToReset(e) {
  e.preventDefault();
  const otp = [...inputs].map(i => i.value).join('');
  if (otp.length === 6) window.location.href = 'datlaimk.html';
}
</script>
</body>
</html>
