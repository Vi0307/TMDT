<body class="bg-surface font-body-md text-on-surface silk-texture min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#FAF9F6] dark:bg-stone-900 border-b border-[#4A2C2A]/10 dark:border-stone-700 shadow-[0_2px_15px_-3px_rgba(74,44,42,0.08)] sticky top-0 z-50">

<div class="font-['Noto_Serif'] antialiased text-2xl font-serif tracking-tight text-[#4A2C2A] dark:text-[#E5A022]">
                HoiAn Heritage
            </div>
<div class="flex gap-4">
<button class="text-[#4A2C2A] dark:text-[#E5A022] hover:text-[#D2312E] transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
</button>
<button class="text-[#4A2C2A] dark:text-[#E5A022] hover:text-[#D2312E] transition-colors duration-300">
<span class="material-symbols-outlined" data-icon="person">person</span>
</button>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-margin-mobile py-section-gap">

<!-- Reset Password Card -->
<div class="bg-surface-container-lowest rounded-lg shadow-[0_2px_15px_-3px_rgba(74,44,42,0.08)] overflow-hidden relative border border-outline-variant/30">
<!-- Decorative Lantern Pattern Header -->
<div class="h-2 bg-secondary"></div>
<div class="p-stack-lg flex flex-col gap-stack-lg">
<div class="text-center">
<h1 class="font-headline-md text-headline-md text-on-surface mb-stack-sm">Đặt lại mật khẩu</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Vui lòng nhập mật khẩu mới cho tài khoản của bạn</p>
</div>
<form class="flex flex-col gap-stack-md">
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="new_password">Mật khẩu mới</label>
<div class="relative">
<input class="w-full bg-transparent border-b border-outline py-stack-sm focus:border-secondary focus:ring-0 transition-colors font-body-lg text-body-lg outline-none placeholder:text-outline-variant" id="new_password" name="new_password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 bottom-stack-sm text-outline hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex flex-col gap-base">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="confirm_password">Xác nhận mật khẩu mới</label>
<div class="relative">
<input class="w-full bg-transparent border-b border-outline py-stack-sm focus:border-secondary focus:ring-0 transition-colors font-body-lg text-body-lg outline-none placeholder:text-outline-variant" id="confirm_password" name="confirm_password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 bottom-stack-sm text-outline hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="mt-stack-md">
<button class="w-full bg-secondary text-on-secondary py-4 px-6 rounded-lg font-label-caps text-label-caps uppercase tracking-widest hover:opacity-90 active:scale-[0.98] transition-all shadow-md" type="submit">
                                Cập nhật mật khẩu
                            </button>
</div>
</form>
<div class="text-center">
<a class="font-body-md text-body-md text-primary hover:text-secondary underline underline-offset-4 decoration-primary/30 transition-colors" href="#">
                            Quay lại đăng nhập
                        </a>
</div>
</div>
<!-- Subtle Decorative Element -->
<div class="absolute -bottom-8 -right-8 opacity-5">
<span class="material-symbols-outlined text-[120px]" data-icon="temp_preferences_custom">temp_preferences_custom</span>
</div>
</div>

<img alt="Hoi An Ancient Town" class="w-full h-full object-cover grayscale-[20%] group-hover:scale-105 transition-transform duration-700" data-alt="Dreamy sunset view of Hoi An ancient town river with colorful lanterns reflecting in the water and traditional wooden boats" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDr0DtLJWuDwJnJXEtEKK0pZcnDqCkxCVgNqITg4R0VonSWGVMv6ozxKVcvQA6mjuoX3vXotQaSUi5oIECZUIVEPeYKRMHA6DxYKv0sr2_qsJ-4im4x2UEdow1xcnBfhVqArDK-_TMdOZCRvk5UKtxMicmMYpCBfub9yar6B2H5spXch9Yl5PrrgvvylRrw8TwI3Q__Fh2a7BKlYy0MI1nt7Cp2c88jvhXztU6HU95p3PoSZIc91cu2dMwH4Zf6n3tDM6XFr9PEik0"/>

<p class="font-title-sm text-surface italic opacity-90">"Lưu giữ vẻ đẹp thời gian trong từng nếp lụa."</p>
</div>
</div>
</div>
