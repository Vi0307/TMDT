<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#fbf9f4",
                        "on-secondary": "#ffffff",
                        "secondary-fixed-dim": "#ffb4ac",
                        "on-tertiary-container": "#593937",
                        "surface-container-low": "#f5f3ee",
                        "secondary-fixed": "#ffdad6",
                        "on-surface-variant": "#514534",
                        "tertiary-fixed-dim": "#eabcb8",
                        "on-primary-fixed-variant": "#614000",
                        "surface-variant": "#e4e2dd",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#e4e2dd",
                        "on-tertiary-fixed": "#2e1413",
                        "on-surface": "#1b1c19",
                        "surface-dim": "#dbdad5",
                        "tertiary": "#795553",
                        "on-primary-container": "#5a3b00",
                        "surface-container-lowest": "#ffffff",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#ffba47",
                        "tertiary-fixed": "#ffdad7",
                        "tertiary-container": "#cfa3a0",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#92030f",
                        "on-tertiary-fixed-variant": "#5f3e3c",
                        "inverse-on-surface": "#f2f1ec",
                        "background": "#fbf9f4",
                        "surface-tint": "#805600",
                        "on-primary-fixed": "#281800",
                        "primary-fixed-dim": "#ffba47",
                        "surface-bright": "#fbf9f4",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#600006",
                        "secondary": "#b52424",
                        "inverse-surface": "#30312e",
                        "primary-container": "#e5a022",
                        "secondary-container": "#ff5a52",
                        "outline-variant": "#d6c4ae",
                        "surface-container-high": "#eae8e3",
                        "primary-fixed": "#ffddb0",
                        "primary": "#805600",
                        "error-container": "#ffdad6",
                        "outline": "#837562",
                        "surface-container": "#f0eee9",
                        "on-background": "#1b1c19",
                        "on-secondary-fixed": "#410003"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "stack-md": "16px",
                        "margin-mobile": "20px",
                        "gutter": "16px",
                        "stack-sm": "8px",
                        "base": "4px",
                        "section-gap": "48px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "title-sm": ["Noto Serif"],
                        "body-md": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "headline-md": ["Noto Serif"],
                        "display-lg": ["Noto Serif"],
                        "label-caps": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "title-sm": ["20px", {"lineHeight": "28px", "fontWeight": "500"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "500"}],
                        "display-lg": ["34px", {"lineHeight": "42px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.1em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        .paper-texture {
            background-color: #fbf9f4;
            background-image: radial-gradient(#d6c4ae 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            background-position: 0 0;
        }
        .minimal-input {
            border: 1px solid #d6c4ae;
            background: #ffffff;
        }
        .minimal-input:focus {
            border-color: #805600;
            box-shadow: 0 0 0 1px rgba(128, 86, 0, 0.1);
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<main class="min-h-screen flex flex-col items-center justify-center p-margin-mobile paper-texture relative overflow-hidden">
<!-- Back to Home Button -->
<a class="fixed top-8 left-8 flex items-center gap-2 text-primary font-label-caps text-label-caps hover:gap-3 transition-all duration-300 z-20" href="#">
<span class="material-symbols-outlined" data-icon="chevron_left">chevron_left</span>
        TRỞ VỀ TRANG CHỦ
    </a>
<!-- Auth Container -->
<div class="w-full max-w-[420px] bg-white rounded-xl shadow-[0_12px_40px_rgba(74,44,42,0.08)] border border-outline-variant/40 overflow-hidden z-10 flex flex-col">
<!-- Branding Header -->
<div class="pt-12 px-stack-lg text-center">
<div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-primary-container/10 mb-stack-md">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="temp_preferences_custom">temp_preferences_custom</span>
</div>
<h1 class="font-display-lg text-display-lg text-primary mb-2">Hội An Tranquility</h1>
<p class="font-body-md text-body-md text-outline">Chào mừng bạn trở lại với không gian di sản.</p>
</div>
<!-- Tab Switcher -->
<div class="flex px-10 mt-10">
<button class="flex-1 py-3 font-label-caps text-label-caps border-b-2 border-primary text-primary transition-colors">ĐĂNG NHẬP</button>
<button class="flex-1 py-3 font-label-caps text-label-caps border-b-2 border-transparent text-outline hover:text-primary transition-colors">ĐĂNG KÝ</button>
</div>
<!-- Form Area -->
<form class="p-10 space-y-stack-md">
<!-- Email Field -->
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-on-surface-variant block px-1" for="email">ĐỊA CHỈ EMAIL</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-[20px]" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-3 minimal-input rounded-lg text-body-md font-body-md transition-all outline-none" id="email" placeholder="example@hoian.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-on-surface-variant block px-1" for="password">MẬT KHẨU</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-[20px]" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-3 minimal-input rounded-lg text-body-md font-body-md transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-4 space-y-stack-md">
<button class="w-full py-4 bg-secondary text-on-secondary font-label-caps text-label-caps rounded-lg shadow-md hover:bg-on-secondary-fixed-variant active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    TIẾP TỤC HÀNH TRÌNH
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="text-center pt-2">
<a class="font-label-caps text-[11px] text-outline hover:text-primary transition-colors uppercase tracking-widest" href="#">Quên mật khẩu?</a>
</div>
</div>
</form>
<!-- Footer Message -->
<div class="p-6 bg-surface-container-low/40 text-center border-t border-outline-variant/10">
<p class="font-body-md text-body-md text-on-surface-variant italic opacity-80">
                "Hành trình vạn dặm bắt đầu từ bước chân đầu tiên."
            </p>
</div>
</div>
</main>
<!-- Content-specific Footer (Simple) -->
<footer class="w-full bg-surface py-stack-lg text-center border-t border-outline-variant/10">
<p class="font-body-md text-body-md text-outline">© 2024 Ký Ức Hội An. Gìn giữ giá trị truyền thống.</p>
<div class="mt-base flex justify-center gap-stack-md">
<a class="font-label-caps text-[10px] text-tertiary hover:text-primary transition-colors uppercase" href="#">Bảo mật</a>
<a class="font-label-caps text-[10px] text-tertiary hover:text-primary transition-colors uppercase" href="#">Điều khoản</a>
<a class="font-label-caps text-[10px] text-tertiary hover:text-primary transition-colors uppercase" href="#">Hỗ trợ</a>
</div>
</footer>
</body></html>
