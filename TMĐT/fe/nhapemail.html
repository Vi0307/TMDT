            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface silk-pattern min-h-screen flex flex-col items-center">
<!-- Header Suppression: Following the Shell Visibility Rule for Transactional Screens -->
<main class="flex-grow flex items-center justify-center w-full px-margin-mobile">
<div class="relative w-full max-w-md">
<!-- Background Decorative Element (Lantern Glow Metaphor) -->
<div class="absolute -top-12 -left-12 w-48 h-48 bg-primary-container/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-12 -right-12 w-64 h-64 bg-secondary-container/5 rounded-full blur-3xl"></div>
<!-- Main Card -->
<div class="relative bg-surface-container-lowest border border-outline-variant/30 rounded-lg shadow-[0_8px_30px_rgb(74,44,42,0.06)] p-stack-lg md:p-12 overflow-hidden">
<!-- Card Header -->
<div class="text-center mb-stack-lg">
<div class="inline-flex items-center justify-center mb-stack-md">
<span class="material-symbols-outlined text-primary text-4xl">key</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-stack-sm">Quên mật khẩu</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Nhập email của bạn để nhận mã xác thực</p>
</div>
<!-- Form -->
<form class="space-y-stack-lg">
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-on-surface-variant block" for="email">EMAIL CỦA BẠN</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all duration-300 py-3 font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant" id="email" placeholder="example@heritage.vn" type="email"/>
<span class="absolute right-0 bottom-3 material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors">mail</span>
</div>
</div>
<button class="w-full bg-secondary hover:bg-on-secondary-fixed-variant text-on-secondary font-label-caps text-label-caps py-4 rounded-lg tracking-widest shadow-md hover:shadow-lg transition-all active:scale-[0.98]" type="submit">
                        GỬI MÃ XÁC THỰC
                    </button>
</form>
<!-- Back to Login -->
<div class="mt-stack-lg text-center">
<a class="inline-flex items-center gap-2 font-body-md text-body-md text-on-surface-variant hover:text-secondary transition-colors duration-300 group" href="#">
<span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                        Quay lại đăng nhập
                    </a>
</div>
<!-- Subtle Texture Detail -->
<div class="absolute top-0 right-0 p-4 opacity-10 pointer-events-none">
<div class="w-16 h-16 border-t-2 border-r-2 border-primary"></div>
</div>
<div class="absolute bottom-0 left-0 p-4 opacity-10 pointer-events-none">
<div class="w-16 h-16 border-b-2 border-l-2 border-primary"></div>
</div>
</div>
<!-- Footer Small Link (Optional Privacy/Help) -->
<div class="mt-stack-lg text-center">
<p class="font-label-caps text-[10px] text-outline uppercase tracking-widest">© 2024 Hoi An Heritage • Silk &amp; Soul</p>
</div>
</div>
</main>
<!-- Visual Anchor - Atmospheric Image Context -->
<div class="fixed inset-0 -z-10 opacity-5 pointer-events-none">
<img alt="Hoi An ancient town textured walls" class="w-full h-full object-cover grayscale" data-alt="Monochrome close-up of weathered yellow lime walls in Hoi An ancient town with subtle cracks and organic textures" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBoA7ZUlddeZI2yi4Zt97SJ4OA5bzItOOP5mPFPh2LE9Z-lnuWJrdQRSZcxxztrGxTZvlj8qeMy3ojH_PqkbyIOVMS_J1RihJDmRbYgq9q8etQ4boLaMRDYgVVz_pomY75sISw495HxcZqyahvBxKNACjQSN56P9NljKNfHDkN_R1TZOX6vJx414d34MIl3o2aKnMiUIxjrF5ClTLrYqbgUHyH5Kkpf3aiH_83hg7x_pZW_KaI8DkpAIezOuAp_FUwvP9aVANGfoW8"/>
</div>

<span class="font-serif italic text-lg text-[#4A2C2A] dark:text-stone-300">Hoi An Heritage</span>

<a class="text-[#4A2C2A]/70 dark:text-stone-500 hover:text-[#4A2C2A] text-sm font-['Be_Vietnam_Pro']" href="#">Chính sách bảo mật</a>
